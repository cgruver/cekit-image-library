schema_version: 1
name: maven
version: v1.0
description: "Installs Latest Apache Maven"
envs:
- name: MAVEN_OPTS
  value: -Djavax.net.ssl.trustStore=${HOME}/.keystore -Djavax.net.ssl.trustStorePassword=changeit
artifacts:
- name: settings.xml
  path: settings.xml
  target: settings.xml
  dest: /
execute:
- script: install.sh